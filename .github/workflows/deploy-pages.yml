name: Desplegar a GitHub Pages

# Publica el sitio estático (dashboard V2) en GitHub Pages.
on:
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "assets/**"
      - "data/**"
      - "downloads/**"
      - "legacy/**"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Empaquetar sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
