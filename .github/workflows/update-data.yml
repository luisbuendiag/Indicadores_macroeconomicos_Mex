name: Actualizar datos (pipeline)

# Actualiza la capa de datos y regenera el Excel. Modo de respaldo: si la
# validación crítica falla, el pipeline conserva la última versión válida.
on:
  workflow_dispatch: {}
  schedule:
    # Días hábiles 13:00 UTC (~7:00 CT). Ajustable.
    - cron: "0 13 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pipeline de datos
        env:
          INEGI_TOKEN: ${{ secrets.INEGI_TOKEN }}
          BANXICO_TOKEN: ${{ secrets.BANXICO_TOKEN }}
        run: python scripts/build_data.py

      - name: Recopilar noticias oficiales (a prueba de fallos)
        run: python scripts/fetch_news.py || true

      - name: Regenerar Excel
        run: python scripts/build_excel.py

      - name: Validar (estricto para el reporte de CI)
        run: python scripts/validate.py || true

      - name: Ejecutar pruebas
        run: python -m pytest -q

      - name: Commit de artefactos actualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ downloads/ || true
          if git diff --cached --quiet; then
            echo "Sin cambios en datos."
          else
            git commit -m "chore(data): actualización automática del pipeline [skip ci]"
            git push
          fi
